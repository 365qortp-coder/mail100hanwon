name: Daily Column Generation

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00 전날)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate column from queue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate:column

      - name: Commit and push
        run: |
          git config user.name "Mail100han Bot"
          git config user.email "bot@mail100hanwon.co.kr"
          if [ -n "$(git status --porcelain)" ]; then
            git add content/
            git commit -m "chore(columns): auto-generate daily column"
            git push
          else
            echo "No new content to commit."
          fi
