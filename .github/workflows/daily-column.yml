name: Daily Column Generation

on:
  # 자동 발행 중단 (2026-07-14, 사용자 결정) — 유튜브 다각도 양산 대신
  # 핀셋포인트 fan-out 실측 기반 칼럼으로 전환 (HOMECOL-01). 수동 실행만 가능.
  # 과거: 매일 발행(색인 실패 전례) → 주 2회 → 중단.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Prefetch transcripts (best-effort; cache fallback covers misses)
        continue-on-error: true
        run: node scripts/fetch-transcripts.mjs

      - name: Generate column from queue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          COLUMNS_PER_RUN: "1"
        run: npm run generate:column

      - name: Generate static HTML + sitemap
        run: node scripts/generate-static-columns.mjs

      - name: Commit and push
        id: commit
        run: |
          git config user.name "Mail100han Bot"
          git config user.email "bot@mail100hanwon.co.kr"
          if [ -n "$(git status --porcelain)" ]; then
            git add content/ 디자인리뉴얼/columns/ 디자인리뉴얼/columns.html 디자인리뉴얼/sitemap.xml
            git commit -m "chore(columns): auto-generate daily column + static HTML"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new content to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram (success)
        if: success() && steps.commit.outputs.pushed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.mjs

      - name: Notify Telegram (failure or empty)
        if: always() && (failure() || steps.commit.outputs.pushed != 'true')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.mjs --failure
