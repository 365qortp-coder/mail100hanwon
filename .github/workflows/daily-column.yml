name: Daily Column Generation

on:
  schedule:
    # 매일 한국시간 오후 3시 (UTC 06:00)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Prefetch transcripts (best-effort; cache fallback covers misses)
        continue-on-error: true
        run: node scripts/fetch-transcripts.mjs

      - name: Generate column from queue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          COLUMNS_PER_RUN: "2"
        run: npm run generate:column

      - name: Commit and push
        id: commit
        run: |
          git config user.name "Mail100han Bot"
          git config user.email "bot@mail100hanwon.co.kr"
          if [ -n "$(git status --porcelain)" ]; then
            git add content/
            git commit -m "chore(columns): auto-generate daily column"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new content to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram (success)
        if: success() && steps.commit.outputs.pushed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.mjs

      - name: Notify Telegram (failure or empty)
        if: always() && (failure() || steps.commit.outputs.pushed != 'true')
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.mjs --failure
